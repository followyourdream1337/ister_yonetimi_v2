<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:13px}
.wrap{width:360px;padding:20px}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:18px;font-weight:600;color:#f1f5f9;letter-spacing:.5px}
.logo p{font-size:11px;color:#334155;margin-top:3px}
.card{background:#1e293b;border:1px solid #2a3347;border-radius:10px;padding:26px}
.card h2{font-size:14px;font-weight:500;color:#e2e8f0;margin-bottom:18px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:500;color:#64748b;margin-bottom:4px}
input{background:#0f172a;border:1px solid #2a3347;border-radius:6px;color:#e2e8f0;font-size:13px;padding:9px 12px;width:100%;outline:none;transition:border-color .15s}
input:focus{border-color:#3b82f6}
.btn{width:100%;background:#2563eb;color:#fff;border:none;border-radius:6px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif;transition:background .15s}
.btn:hover{background:#1d4ed8}
.alert{padding:9px 13px;border-radius:6px;font-size:12px;margin-bottom:14px;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#fca5a5}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>İSTER YÖNETİM SİSTEMİ</h1>
    <p>v2.0</p>
  </div>
  <div class="card">
    <h2>Sisteme Giriş</h2>
    {% if hata %}<div class="alert">{{ hata }}</div>{% endif %}
    <form method="POST">
      <div class="fg"><label class="fl">Kullanıcı Adı</label><input type="text" name="kullanici_adi" autofocus required></div>
      <div class="fg"><label class="fl">Şifre</label><input type="password" name="sifre" required></div>
      <button type="submit" class="btn">Giriş Yap</button>
    </form>
  </div>
</div>
</body>
</html>
